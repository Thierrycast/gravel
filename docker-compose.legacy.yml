name: gravel
services:
  gravel:
    build:
      context: .
      dockerfile: Dockerfile
    image: gravel:0.1.0
    container_name: gravel
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: "134217728" # 128M
        limits:
          memory: "512M"
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    ports:
      - target: 3000
        published: "8421"
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/gravel/data
        target: /app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    network_mode: bridge
    x-casaos:
      envs:
        - container: TZ
          description:
            en_us: TimeZone
            pt_br: Fuso Horário
      ports:
        - container: "3000"
          description:
            en_us: WebUI HTTP Port
            pt_br: Porta da Interface Web
      volumes:
        - container: /app/data
          description:
            en_us: Database directory
            pt_br: Diretório do Banco de Dados

x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  main: gravel
  author: "Thierry"
  category: Finance
  description:
    en_us: "A personal finance dashboard with bank data aggregation (Pluggy Open Finance) and crypto (Binance)."
    pt_br: "Um dashboard financeiro pessoal com agregação de dados bancários (Pluggy Open Finance) e crypto (Binance)."
  developer: "Thierry"
  icon: https://raw.githubusercontent.com/Thierrycast/gravel/main/public/icon.png
  index: /
  is_uncontrolled: false
  port_map: "8421"
  scheme: http
  title:
    en_us: Gravel Finance
    pt_br: Gravel Finance