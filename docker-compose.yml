name: gravel
services:
  gravel:
    build:
      context: .
      dockerfile: Dockerfile
    image: gravel:0.1.0
    container_name: gravel
    init: true
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8421}:3000"
    volumes:
      - gravel_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - TZ=${TZ:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  gravel_data:
    driver: local
