name: gravel
services:
  gravel:
    build:
      context: .
      dockerfile: Dockerfile
    image: gravel:0.1.0
    container_name: gravel
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - gravel_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  gravel_data:
    driver: local
