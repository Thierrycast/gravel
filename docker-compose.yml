services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gravel:latest
    container_name: gravel
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/prod.db
    volumes:
      - gravel_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  gravel_data:
